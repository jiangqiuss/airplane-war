<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>星际掠食者 - Roguelike 飞机大战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;cursor:crosshair}
</style>

<body>
<canvas id="c"></canvas>
<script>
// ==================== SETUP ====================
const C=document.getElementById('c'),X=C.getContext('2d'),W=480,H=720;
C.width=W;C.height=H;
function resize(){const s=Math.min(innerWidth/W,innerHeight/H);C.style.width=W*s+'px';C.style.height=H*s+'px'}
resize();onresize=resize;

// Audio
let AC;
function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)()}
function beep(f,d,t='square',v=.03){if(!AC)return;try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}catch(e){}}
function sfx(name){const s={hit:[400,.08,'square',.04],crit:[800,.12,'sine',.06],die:[150,.25,'sawtooth',.05],coin:[1200,.06,'sine',.03],heal:[600,.15,'sine',.04],bomb:[80,.5,'sawtooth',.07],boss:[60,.6,'sawtooth',.08],wave:[500,.1,'sine',.03],upg:[700,.15,'sine',.04],menu:[300,.08,'sine',.02],combo:[900,.1,'sine',.05],shield:[1000,.1,'sine',.03]};const p=s[name];if(p)beep(p[0],p[1],p[2],p[3])}

// Input
const K={};const M={x:0,y:0,click:false,down:false,dbl:false};
onkeydown=e=>{K[e.code]=1;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyE'].includes(e.code))e.preventDefault()};
onkeyup=e=>K[e.code]=0;
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();M.x=(e.clientX-r.left)*W/r.width;M.y=(e.clientY-r.top)*H/r.height});
C.addEventListener('mousedown',e=>{initAudio();M.down=1;M.click=1;e.preventDefault()});
C.addEventListener('mouseup',()=>M.down=0);
C.addEventListener('dblclick',e=>{initAudio();const r=C.getBoundingClientRect();M.x=(e.clientX-r.left)*W/r.width;M.y=(e.clientY-r.top)*H/r.height;M.dbl=1;e.preventDefault()});
C.addEventListener('touchstart',e=>{initAudio();const t=e.touches[0],r=C.getBoundingClientRect();M.x=(t.clientX-r.left)*W/r.width;M.y=(t.clientY-r.top)*H/r.height;M.down=1;M.click=1;e.preventDefault()},{passive:false});
C.addEventListener('touchmove',e=>{const t=e.touches[0],r=C.getBoundingClientRect();M.x=(t.clientX-r.left)*W/r.width;M.y=(t.clientY-r.top)*H/r.height;e.preventDefault()},{passive:false});
C.addEventListener('touchend',()=>M.down=0);

// Utils
const rng=(a,b)=>Math.random()*(b-a)+a,rngI=(a,b)=>Math.floor(rng(a,b+1)),pick=a=>a[Math.floor(Math.random()*a.length)];
function wPick(items,wts){let t=wts.reduce((a,b)=>a+b,0),r=Math.random()*t;for(let i=0;i<items.length;i++){r-=wts[i];if(r<=0)return items[i]}return items[items.length-1]}
function rectHit(x1,y1,w1,h1,x2,y2,w2,h2){return x1<x2+w2&&x1+w1>x2&&y1<y2+h2&&y1+h1>y2}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function lerp(a,b,t){return a+(b-a)*t}

// ==================== STARS ====================
const stars=Array.from({length:150},()=>({x:rng(0,W),y:rng(0,H),s:rng(.3,2.5),v:rng(.2,1.8),c:rng(0,1)<.1?'#aaf':'#ccf'}));
function updStars(){for(const s of stars){s.y+=s.v;if(s.y>H){s.y=0;s.x=rng(0,W)}}}
function drwStars(){for(const s of stars){X.fillStyle=s.c;X.globalAlpha=s.s/3;X.shadowColor=s.c;X.shadowBlur=s.s*2;X.beginPath();X.arc(s.x,s.y,s.s*.6,0,Math.PI*2);X.fill();}X.shadowBlur=0;X.globalAlpha=1}

// ==================== PARTICLES ====================
let parts=[];
function emit(x,y,col,n=5,spd=3,life=25,sz=2){for(let i=0;i<n;i++){const a=rng(0,Math.PI*2),v=rng(.5,spd);parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life,ml:life,col,sz:rng(.5,sz)})}}
function updParts(){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.03;if(--p.life<=0)parts.splice(i,1)}}
function drwParts(){for(const p of parts){const a=p.life/p.ml;X.globalAlpha=a;X.fillStyle=p.col;X.shadowColor=p.col;X.shadowBlur=6;X.beginPath();X.arc(p.x,p.y,p.sz*a,0,Math.PI*2);X.fill();}X.shadowBlur=0;X.globalAlpha=1}

// Screen shake
let shakeAmt=0;
function shake(v){shakeAmt=Math.max(shakeAmt,v)}

// Floating text
let floats=[];
function ftext(x,y,txt,col='#fff',sz=14){floats.push({x,y,txt,col,sz,life:45,ml:45})}
function updFloats(){for(let i=floats.length-1;i>=0;i--){floats[i].y-=.8;floats[i].x+=rng(-.3,.3);if(--floats[i].life<=0)floats.splice(i,1)}}
function drwFloats(){for(const f of floats){X.globalAlpha=f.life/f.ml;X.fillStyle=f.col;X.font=`bold ${f.sz}px 'Courier New',monospace`;X.textAlign='center';X.fillText(f.txt,f.x,f.y)}X.globalAlpha=1}

// Wave announcement
let announce='',announceTimer=0,announceCol='#fff';
function showAnnounce(txt,t=90,col='#fff'){announce=txt;announceTimer=t;announceCol=col}
function drwAnnounce(){if(announceTimer<=0)return;announceTimer--;const a=Math.min(1,announceTimer/20);X.globalAlpha=a;X.fillStyle=announceCol;X.font=`bold 26px 'Courier New',monospace`;X.textAlign='center';X.shadowColor=announceCol;X.shadowBlur=15;X.fillText(announce,W/2,H/2-80);X.shadowBlur=0;X.globalAlpha=1}

// ==================== UPGRADES (20种, 4稀有度) ====================
const RCOL=['#999','#4d4','#48f','#c4f','#fa0'],RNAM=['普通','优秀','稀有','史诗','传说'];
const UPG=[
// FIREPOWER (火力)
{id:'dmg',name:'火力核心',icon:'🔥',desc:'伤害 +{v}',r:0,mlv:8,w:10,v:lv=>3+lv*2,fx:(p,lv)=>p.damage+=3+lv*2},
{id:'rate',name:'速射芯片',icon:'⚡',desc:'射速 +{v}%',r:0,mlv:6,w:10,v:lv=>8+lv*5,fx:(p,lv)=>p.fireRate*=(1-(8+lv*5)/100)},
{id:'multi',name:'多重射击',icon:'✦',desc:'额外子弹 +1',r:2,mlv:3,w:5,v:lv=>1,fx:(p,lv)=>p.bulletCount+=1},
{id:'pierce',name:'穿透弹芯',icon:'📌',desc:'穿透 +1 个敌人',r:1,mlv:4,w:5,v:lv=>1,fx:(p,lv)=>p.pierce+=1},
{id:'crit',name:'暴击芯片',icon:'💥',desc:'暴击率 +{v}%',r:1,mlv:5,w:6,v:lv=>6+lv*4,fx:(p,lv)=>p.critCh+=(6+lv*4)/100},
{id:'critd',name:'暴击强化',icon:'💎',desc:'暴击伤害 +{v}%',r:2,mlv:4,w:3,v:lv=>30+lv*20,fx:(p,lv)=>p.critMul+=(30+lv*20)/100},
{id:'spread',name:'弹幕扩散',icon:'🌊',desc:'散布角 +{v}°',r:1,mlv:3,w:4,v:lv=>12*lv,fx:(p,lv)=>p.spreadA+=12*lv*Math.PI/180},
{id:'homing',name:'追踪系统',icon:'🎯',desc:'子弹追踪力 +{v}',r:2,mlv:3,w:3,v:lv=>lv,fx:(p,lv)=>p.homing+=.08},
{id:'explode',name:'爆炸弹头',icon:'💣',desc:'爆炸半径 {v}px',r:2,mlv:3,w:3,v:lv=>25+lv*15,fx:(p,lv)=>p.explodeR+=25+lv*15},
{id:'chain',name:'闪电链',icon:'⛓️',desc:'连锁 +1 个目标',r:3,mlv:2,w:2,v:lv=>1,fx:(p,lv)=>p.chain+=1},
// DEFENSE (防御)
{id:'maxhp',name:'生命强化',icon:'❤️',desc:'最大生命 +{v}',r:0,mlv:8,w:10,v:lv=>15+lv*10,fx:(p,lv)=>{p.maxHP+=15+lv*10;p.hp+=15+lv*10}},
{id:'shield',name:'护盾',icon:'🛡️',desc:'护盾 +{v}',r:2,mlv:3,w:3,v:lv=>20+lv*15,fx:(p,lv)=>{p.maxSh+=20+lv*15;p.sh=Math.min(p.sh+20+lv*15,p.maxSh)}},
{id:'armor',name:'装甲板',icon:'🔩',desc:'减伤 +2 点',r:1,mlv:5,w:5,v:lv=>2,fx:(p,lv)=>p.armor+=2},
{id:'regen',name:'自动修复',icon:'💚',desc:'每秒回血 +{v}',r:1,mlv:4,w:4,v:lv=>(.5+lv*.5).toFixed(1),fx:(p,lv)=>p.regen+=.5},
{id:'thorn',name:'荆棘装甲',icon:'🌵',desc:'反弹 {v}% 伤害',r:2,mlv:3,w:3,v:lv=>15*lv,fx:(p,lv)=>p.thorn+=15*lv/100},
// UTILITY (辅助)
{id:'spd',name:'推进器',icon:'🚀',desc:'移速 +{v}%',r:0,mlv:5,w:8,v:lv=>8+lv*5,fx:(p,lv)=>p.speed*=(1+(8+lv*5)/100)},
{id:'mag',name:'磁铁',icon:'🧲',desc:'拾取范围 +{v}',r:0,mlv:5,w:8,v:lv=>30+lv*20,fx:(p,lv)=>p.magR+=30+lv*20},
{id:'luck',name:'幸运星',icon:'🍀',desc:'幸运 +1',r:1,mlv:5,w:5,v:lv=>1,fx:(p,lv)=>p.luck+=1},
{id:'coin',name:'金币加成',icon:'💰',desc:'金币 +{v}%',r:1,mlv:3,w:4,v:lv=>15*lv,fx:(p,lv)=>p.coinMul+=15*lv/100},
// SPECIAL (特殊)
{id:'drone',name:'护卫无人机',icon:'🛸',desc:'环绕无人机 +1',r:3,mlv:2,w:2,v:lv=>1,fx:(p,lv)=>p.drones+=1},
{id:'bombup',name:'炸弹扩容',icon:'🗯️',desc:'炸弹 +1',r:2,mlv:2,w:3,v:lv=>1,fx:(p,lv)=>p.bombs+=1},
// LEGENDARY (传说)
{id:'lifesteal',name:'生命汲取',icon:'🧛',desc:'攻击回血 {v}%',r:3,mlv:2,w:2,v:lv=>5*lv,fx:(p,lv)=>p.lifesteal+=5*lv/100},
{id:'rage',name:'狂暴之心',icon:'😤',desc:'血量越低伤害越高(最高+{v}%)',r:3,mlv:1,w:1,v:lv=>100,fx:(p,lv)=>p.rage=1},
{id:'frost',name:'寒冰弹',icon:'❄️',desc:'减速敌人 {v}%',r:2,mlv:3,w:3,v:lv=>10*lv,fx:(p,lv)=>p.frost+=10*lv/100},
];

// ==================== SHIPS (6架) ====================
const SHIPS=[
{id:'falcon',name:'猎鹰号',desc:'均衡型 · 新手友好',color:'#0ef',hp:100,dmg:10,fr:180,spd:4.5,cost:0,skill:'闪避率5%'},
{id:'hammer',name:'重锤号',desc:'重装甲 · 高伤害',color:'#f80',hp:160,dmg:14,fr:250,spd:3,cost:300,skill:'受击减伤+3'},
{id:'phantom',name:'幻影号',desc:'极速 · 小判定框',color:'#c6f',hp:60,dmg:8,fr:120,spd:6,cost:500,skill:'判定框-30%'},
{id:'thunder',name:'雷霆号',desc:'连射狂魔 · 弹幕之王',color:'#ff0',hp:80,dmg:6,fr:80,spd:4.2,cost:800,skill:'每次射击+1颗子弹'},
{id:'vampire',name:'吸血鬼号',desc:'击杀回血 · 持久战',color:'#f4a',hp:70,dmg:9,fr:160,spd:4,cost:600,skill:'击杀回血+5'},
{id:'nova',name:'新星号',desc:'炸弹伤害×2 · 清屏之王',color:'#4ff',hp:90,dmg:12,fr:200,spd:3.8,cost:1000,skill:'炸弹伤害翻倍'},
];

// ==================== SHOP (永久商店) ====================
const SHOP=[
{id:'s_hp',name:'生命强化',desc:'基础生命 +15',stat:'hp',val:15,costs:[50,100,200,400,800]},
{id:'s_dmg',name:'火力强化',desc:'基础伤害 +2',stat:'dmg',val:2,costs:[50,100,200,400,800]},
{id:'s_spd',name:'速度强化',desc:'基础移速 +0.3',stat:'spd',val:.3,costs:[80,160,320]},
{id:'s_rate',name:'射速强化',desc:'基础射速 -10ms',stat:'fr',val:-10,costs:[80,160,320]},
{id:'s_luck',name:'幸运强化',desc:'初始幸运 +1',stat:'luck',val:1,costs:[200,500]},
{id:'s_coin',name:'金币大师',desc:'金币获取 +10%',stat:'coinB',val:10,costs:[100,250,500]},
];

// ==================== LEADERBOARD ====================
function defBoard(){return[]}
let board;
function loadBoard(){try{board=JSON.parse(localStorage.getItem('sr_lb'))||defBoard()}catch(e){board=defBoard()}}
function saveBoard(){localStorage.setItem('sr_lb',JSON.stringify(board))}
function addToBoard(wave,kills,coins,shipName,upgrades){
  board.push({wave,kills,coins,ship:shipName,upgs:upgrades,date:Date.now()});
  board.sort((a,b)=>b.wave-a.wave||b.kills-a.kills);
  if(board.length>20)board.length=20;
  saveBoard();
}
loadBoard();

// ==================== SAVE ====================
function defSave(){return{coins:0,runs:0,bestW:0,bestK:0,totalKills:0,sl:{},ships:['falcon'],sel:'falcon'}}
let sv;
function load(){try{sv=JSON.parse(localStorage.getItem('sr3'))||defSave()}catch(e){sv=defSave()}const d=defSave();for(const k in d)if(!(k in sv))sv[k]=d[k]}
function store(){localStorage.setItem('sr3',JSON.stringify(sv))}
load();

// ==================== GAME STATE ====================
const ST={MENU:0,SHIP:1,SHOP:2,PLAY:3,UPG:4,OVER:5,BOARD:6,EVENT:7};
let state=ST.MENU,gt=0;
let P,enemies,eBul,pBul,pickups,wave,waveList,waveTmr,killCnt,coinGot,runCoins;
let boss,bossOn,upgChoices,comboN,comboT,maxCombo;
let evtChoices,currentEvt;
let totalUpgCount;
let gamePhase='idle'; // 'idle','fighting','upgrading','event'
let phaseTimer=0;
let stuckTimer=0; // Safety: detect if stuck in any state too long

function initPlayer(){
  const sh=SHIPS.find(s=>s.id===sv.sel)||SHIPS[0];
  let hp=sh.hp,dmg=sh.dmg,fr=sh.fr,spd=sh.spd,luck=0,coinB=0;
  const sl=sv.sl||{};
  for(const s of SHOP){const lv=sl[s.id]||0;for(let i=0;i<lv;i++){
    if(s.stat==='hp')hp+=s.val;if(s.stat==='dmg')dmg+=s.val;
    if(s.stat==='spd')spd+=s.val;if(s.stat==='fr')fr+=s.val;
    if(s.stat==='luck')luck+=s.val;if(s.stat==='coinB')coinB+=s.val;
  }}
  P={x:W/2,y:H-80,w:30,h:36,color:sh.color,shipId:sh.id,shipName:sh.name,
    hp,maxHP:hp,damage:dmg,fireRate:fr,speed:spd,bulletCount:1,
    pierce:0,critCh:0,critMul:1.5,spreadA:0,homing:0,explodeR:0,chain:0,
    armor:0,regen:0,sh:0,maxSh:0,magR:60,luck,coinMul:coinB/100,
    drones:0,bombs:1,fireTmr:0,invTmr:0,droneAng:0,owned:{},
    thorn:0,lifesteal:0,rage:0,frost:0,dodge:0,killHeal:0,bombMul:1};
  // Ship passive
  if(sh.id==='falcon')P.dodge=.05;
  if(sh.id==='hammer')P.armor+=3;
  if(sh.id==='phantom'){P.w*=.7;P.h*=.7}
  if(sh.id==='thunder')P.bulletCount+=1;
  if(sh.id==='vampire')P.killHeal=5;
  if(sh.id==='nova')P.bombMul=2;
}

function initGame(){
  initPlayer();enemies=[];eBul=[];pBul=[];pickups=[];parts=[];floats=[];
  wave=0;waveList=[];waveTmr=0;killCnt=0;coinGot=0;boss=null;bossOn=false;
  comboN=0;comboT=0;maxCombo=0;runCoins=0;totalUpgCount=0;
  gamePhase='idle';phaseTimer=0;stuckTimer=0;sv.runs++;store();
  startNextWave();
}

// ==================== SPAWNING ====================
function spawnE(type,x,y){
  const ws=1+wave*.08;
  const e={x:x||rng(30,W-30),y:y||-30,type,timer:0,hf:0,slowed:0};
  const defs={
    basic:{hp:15*ws,mhp:15*ws,spd:1.5+wave*.05,w:22,h:22,sc:10},
    tracker:{hp:20*ws,mhp:20*ws,spd:2+wave*.04,w:20,h:20,sc:15},
    shooter:{hp:25*ws,mhp:25*ws,spd:1+wave*.03,w:24,h:24,sc:20},
    tank:{hp:60*ws,mhp:60*ws,spd:.8,w:30,h:30,sc:30},
    swarm:{hp:8*ws,mhp:8*ws,spd:2.5,w:14,h:14,sc:5},
    splitter:{hp:30*ws,mhp:30*ws,spd:1.2,w:26,h:26,sc:25},
  };
  Object.assign(e,defs[type]);
  e.vy=e.spd;e.vx=type==='swarm'?rng(-1,1):rng(-.5,.5);
  if(type==='shooter')e.shTmr=rngI(40,80);
  enemies.push(e);
}

function spawnBoss(){
  const bn=Math.floor(wave/5),ws=1+wave*.1;
  const bossTypes=[
    {name:'钢铁巨蝎',color:'#f40',patterns:[0,1,2]},
    {name:'暗影织网者',color:'#a4f',patterns:[1,2,3]},
    {name:'等离子泰坦',color:'#4ff',patterns:[0,2,4]},
    {name:'虚空领主',color:'#f4f',patterns:[1,3,4]},
  ];
  const bt=bossTypes[(bn-1)%bossTypes.length];
  boss={x:W/2,y:-60,ty:80,w:64,h:52,hp:300*ws*bn,mhp:300*ws*bn,spd:1,
    phase:0,timer:0,pat:0,patTmr:0,sc:200*bn,entered:false,hf:0,isBoss:true,
    name:bt.name,color:bt.color,patterns:bt.patterns};
  bossOn=true;enemies.push(boss);
}

function startNextWave(){
  wave++;
  gamePhase='fighting';phaseTimer=0;
  if(wave%5===0){spawnBoss();showAnnounce(`⚠ ${boss.name} 来袭 ⚠`,120,'#f44');return}
  // Random event every 3 waves (not boss wave)
  if(wave>1&&wave%3===0&&Math.random()<.5){
    gamePhase='event';
    offerEvent();
    return;
  }
  showAnnounce(`波次 ${wave}`,'#0ef');
  const cnt=Math.min(5+Math.floor(wave*1.2),25);
  waveList=[];
  for(let i=0;i<cnt;i++){
    let t='basic';const r=Math.random();
    if(wave>=8&&r<.06)t='splitter';
    else if(wave>=3&&r<.15)t='tracker';
    else if(wave>=5&&r<.10)t='shooter';
    else if(wave>=7&&r<.08)t='tank';
    else if(wave>=4&&r<.20)t='swarm';
    waveList.push({type:t,delay:i*rngI(12,30),done:false});
  }
}

function spawnPickup(x,y,type){pickups.push({x,y,type,vy:.8,life:420})}
function spawnMini(x,y){enemies.push({x,y,type:'swarm',hp:8,mhp:8,spd:2.5,w:14,h:14,sc:5,vy:2.5,vx:rng(-1,1),timer:0,hf:0,slowed:0})}

// ==================== EVENTS (随机事件) ====================
const EVENTS=[
{id:'heal_all',name:'补给站',desc:'恢复全部生命',icon:'💚',fx:()=>{P.hp=P.maxHP;emit(P.x,P.y,'#4f4',20,4,25)}},
{id:'dmg_up',name:'军火库',desc:'伤害永久+5',icon:'🔥',fx:()=>{P.damage+=5;emit(P.x,P.y,'#f80',15,3,20)}},
{id:'bomb_gift',name:'弹药补给',desc:'获得2颗炸弹',icon:'🗯️',fx:()=>{P.bombs+=2;emit(P.x,P.y,'#ff0',15,3,20)}},

// ==================== PLAYER ====================
function updPlayer(){
  let dx=0,dy=0;
  if(K.ArrowLeft||K.KeyA)dx=-1;if(K.ArrowRight||K.KeyD)dx=1;
  if(K.ArrowUp||K.KeyW)dy=-1;if(K.ArrowDown||K.KeyS)dy=1;
  if(dx&&dy){dx*=.707;dy*=.707}
  P.x=clamp(P.x+dx*P.speed,P.w/2,W-P.w/2);
  P.y=clamp(P.y+dy*P.speed,P.h/2,H-P.h/2);
  P.fireTmr++;
  if(P.fireTmr>=P.fireRate/16.67){P.fireTmr=0;fireBullets()}
  if(P.regen>0)P.hp=Math.min(P.maxHP,P.hp+P.regen/60);
  if(P.maxSh>0&&P.sh<P.maxSh)P.sh=Math.min(P.maxSh,P.sh+.05);
  if(P.invTmr>0)P.invTmr--;
  P.droneAng+=.03;
  if(K.Space||K.KeyE){K.Space=0;K.KeyE=0;if(P.bombs>0)useBomb()}
  // Pickup magnet
  for(let i=pickups.length-1;i>=0;i--){
    const pk=pickups[i],d=Math.hypot(pk.x-P.x,pk.y-P.y);
    if(d<P.magR){const a=Math.atan2(P.y-pk.y,P.x-pk.x);pk.x+=Math.cos(a)*5;pk.y+=Math.sin(a)*5}
    if(d<15){collect(pk);pickups.splice(i,1)}
  }
}

function fireBullets(){
  const cnt=P.bulletCount,ta=P.spreadA||(cnt>1?(cnt-1)*8*Math.PI/180:0);
  const sa=-Math.PI/2-ta/2,st=cnt>1?ta/(cnt-1):0;
  for(let i=0;i<cnt;i++){
    const ang=cnt===1?-Math.PI/2:sa+st*i,spd=8;
    pBul.push({x:P.x,y:P.y-P.h/2,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      dmg:P.damage,pierce:P.pierce,homing:P.homing,explR:P.explodeR,chain:P.chain,
      frost:P.frost,w:4,h:8,hit:new Set()});
  }
  for(let i=0;i<P.drones;i++){
    const a=P.droneAng+Math.PI*2/P.drones*i;
    pBul.push({x:P.x+Math.cos(a)*50,y:P.y+Math.sin(a)*50,vx:0,vy:-6,
      dmg:P.damage*.5,pierce:0,homing:0,explR:0,chain:0,frost:0,w:3,h:6,hit:new Set()});
  }
  sfx('hit');
}

function useBomb(){
  P.bombs--;shake(15);sfx('bomb');
  const bd=P.damage*5*P.bombMul;
  for(const e of enemies){e.hp-=bd;emit(e.x,e.y,'#ff0',12,4,22);ftext(e.x,e.y-20,Math.floor(bd)+'','#ff0',16)}
  eBul=[];
  for(let i=0;i<60;i++)emit(rng(0,W),rng(0,H),'#ff8',1,rng(2,6),rng(20,45));
}

// ==================== ENEMIES ====================
function updEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];e.timer++;if(e.hf>0)e.hf--;
    if(e.slowed>0)e.slowed--;
    const sm=e.slowed>0?.5:1;
    if(e.isBoss){updBoss(e);if(e.hp<=0){bossDie(e);enemies.splice(i,1);bossOn=false;boss=null}continue}
    switch(e.type){
      case'basic':e.y+=e.vy*sm;e.x+=e.vx*sm;if(e.x<20||e.x>W-20)e.vx*=-1;break;
      case'tracker':{const a=Math.atan2(P.y-e.y,P.x-e.x);e.x+=Math.cos(a)*e.spd*.5*sm;e.y+=e.spd*.7*sm;break}
      case'shooter':e.y+=e.vy*sm;e.x+=e.vx*sm;if(e.x<20||e.x>W-20)e.vx*=-1;
        if(--e.shTmr<=0){e.shTmr=rngI(40,80);const a=Math.atan2(P.y-e.y,P.x-e.x);eBul.push({x:e.x,y:e.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,dmg:8+wave,w:6,h:6})}break;
      case'tank':e.y+=e.vy*sm;break;
      case'swarm':e.y+=e.vy*sm;e.x+=Math.sin(e.timer*.1)*1.5*sm;break;
      case'splitter':e.y+=e.vy*sm;e.x+=e.vx*sm;if(e.x<20||e.x>W-20)e.vx*=-1;break;
    }
    if(e.y>H+50||e.y<-100){enemies.splice(i,1);continue}
    if(e.hp<=0){enemyDie(e,i);enemies.splice(i,1)}
  }
}

function updBoss(b){
  b.patTmr++;
  if(!b.entered){b.y+=1;if(b.y>=b.ty){b.entered=1;b.y=b.ty}return}
  const hp=b.hp/b.mhp;
  b.phase=hp>.5?0:hp>.25?1:2;
  b.x+=Math.sin(b.timer*.02)*(1+b.phase);b.x=clamp(b.x,40,W-40);
  const fr=[55,38,22][b.phase];
  if(b.patTmr%fr===0){
    const pat=b.patterns[b.pat%b.patterns.length];
    switch(pat){
      case 0:for(let a=-3;a<=3;a++){const ang=Math.PI/2+a*.22;eBul.push({x:b.x,y:b.y+b.h/2,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,dmg:10+wave,w:8,h:8})}break;
      case 1:{const a=Math.atan2(P.y-b.y,P.x-b.x);for(let j=0;j<3;j++)eBul.push({x:b.x,y:b.y+b.h/2,vx:Math.cos(a)*(3.5+j*.5),vy:Math.sin(a)*(3.5+j*.5),dmg:12+wave,w:8,h:8});break}
      case 2:for(let a=0;a<8;a++){const ang=b.timer*.05+a*Math.PI/4;eBul.push({x:b.x,y:b.y+b.h/2,vx:Math.cos(ang)*2.5,vy:Math.sin(ang)*2.5,dmg:8+wave,w:6,h:6})}break;
      case 3:for(let j=0;j<5;j++)eBul.push({x:rng(50,W-50),y:b.y+30,vx:rng(-.3,.3),vy:3+rng(0,2),dmg:8+wave,w:5,h:5});break;
      case 4:for(let a=0;a<12;a++){const ang=b.timer*.08+a*Math.PI/6;eBul.push({x:b.x,y:b.y,vx:Math.cos(ang)*2,vy:Math.sin(ang)*2+1,dmg:10+wave,w:5,h:5})}break;
    }
    b.pat++;
  }
}

function bossDie(b){
  shake(25);sfx('boss');
  emit(b.x,b.y,b.color,80,7,50,4);emit(b.x,b.y,'#ff0',50,5,40,3);
  for(let i=0;i<25+wave*3;i++)spawnPickup(b.x+rng(-60,60),b.y+rng(-40,40),'coin');
  spawnPickup(b.x,b.y,'hp');spawnPickup(b.x-20,b.y,'bomb');spawnPickup(b.x+20,b.y,'bomb');
  killCnt++;
  ftext(W/2,H/2-50,`BOSS 击败! +${b.sc}💰`,b.color,28);
  runCoins+=b.sc;coinGot+=b.sc;
  showAnnounce(`${boss.name} 已被消灭!`,120,'#ff0');
}

function enemyDie(e,idx){
  killCnt++;comboN++;comboT=150;maxCombo=Math.max(maxCombo,comboN);
  emit(e.x,e.y,'#f44',8,3,20);sfx('die');
  // Rage damage bonus
  const rageMul=P.rage?1+(1-P.hp/P.maxHP):1;
  // Kill heal (vampire ship)
  if(P.killHeal>0){P.hp=Math.min(P.maxHP,P.hp+P.killHeal);emit(P.x,P.y,'#4f4',3,2,10)}
  if(Math.random()<.4+P.coinMul)spawnPickup(e.x,e.y,'coin');
  if(Math.random()<.08)spawnPickup(e.x,e.y,'hp');
  if(Math.random()<.02)spawnPickup(e.x,e.y,'bomb');
  // Splitter
  if(e.type==='splitter'){for(let i=0;i<3;i++)spawnMini(e.x+rng(-20,20),e.y+rng(-10,10))}
}

// ==================== BULLETS ====================
function updBullets(){
  for(let i=pBul.length-1;i>=0;i--){
    const b=pBul[i];
    if(b.homing>0&&enemies.length>0){
      let cl=null,cd=Infinity;
      for(const e of enemies){if(b.hit.has(e))continue;const d=Math.hypot(e.x-b.x,e.y-b.y);if(d<cd){cd=d;cl=e}}
      if(cl&&cd<200){const ta=Math.atan2(cl.y-b.y,cl.x-b.x),ca=Math.atan2(b.vy,b.vx);let df=ta-ca;while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;const na=ca+df*b.homing,s=Math.hypot(b.vx,b.vy);b.vx=Math.cos(na)*s;b.vy=Math.sin(na)*s}
    }
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){pBul.splice(i,1);continue}
    let dead=false;
    const rageMul=P.rage?1+(1-P.hp/P.maxHP):1;
    for(const e of enemies){
      if(b.hit.has(e))continue;
      if(rectHit(b.x-b.w/2,b.y-b.h/2,b.w,b.h,e.x-e.w/2,e.y-e.h/2,e.w,e.h)){
        let dmg=b.dmg*rageMul,isCrit=Math.random()<P.critCh;
        if(isCrit){dmg*=P.critMul;ftext(e.x,e.y-15,'暴击!','#ff0',13);sfx('crit')}
        e.hp-=dmg;e.hf=4;b.hit.add(e);
        // Frost
        if(b.frost>0)e.slowed=60;
        // Lifesteal
        if(P.lifesteal>0){const heal=dmg*P.lifesteal;P.hp=Math.min(P.maxHP,P.hp+heal);if(heal>1)emit(P.x,P.y,'#4f4',2,1,10)}
        emit(b.x,b.y,'#ff4',3,2,10);ftext(e.x,e.y-10,Math.floor(dmg)+'',isCrit?'#ff0':'#fff',isCrit?16:11);
        if(b.explR>0){emit(b.x,b.y,'#f80',18,5,18);for(const e2 of enemies){if(e2===e)continue;if(Math.hypot(e2.x-b.x,e2.y-b.y)<b.explR){e2.hp-=dmg*.5;e2.hf=4}}shake(3)}
        if(b.chain>0){let ct=e;for(let c=0;c<b.chain;c++){let nn=null,nd=150;for(const e2 of enemies){if(e2===ct||b.hit.has(e2))continue;const d=Math.hypot(e2.x-ct.x,e2.y-ct.y);if(d<nd){nd=d;nn=e2}}if(nn){nn.hp-=dmg*.4;nn.hf=4;b.hit.add(nn);emit(nn.x,nn.y,'#4af',5,3,15);ct=nn}}}
        if(b.pierce<=0){dead=true;break}b.pierce--;
      }
    }
    if(dead)pBul.splice(i,1);
  }
  // Enemy bullets
  for(let i=eBul.length-1;i>=0;i--){
    const b=eBul[i];b.x+=b.vx;b.y+=b.vy;
    if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){eBul.splice(i,1);continue}
    // Dodge check
    if(P.invTmr<=0&&rectHit(b.x-b.w/2,b.y-b.h/2,b.w,b.h,P.x-P.w/2+4,P.y-P.h/2+4,P.w-8,P.h-8)){
      if(Math.random()<P.dodge){ftext(P.x,P.y-30,'闪避!','#4ff',14);emit(P.x,P.y,'#4ff',5,2,12);eBul.splice(i,1);continue}
      dmgP(b.dmg);eBul.splice(i,1);
    }
  }
}

// ==================== DAMAGE & PICKUPS ====================
function dmgP(dmg){
  if(P.invTmr>0)return;
  // Shield absorb
  if(P.sh>0){const ab=Math.min(P.sh,dmg);P.sh-=ab;dmg-=ab;emit(P.x,P.y,'#48f',5,2,10)}
  dmg=Math.max(1,dmg-P.armor);
  // Dodge check for contact
  if(Math.random()<P.dodge){ftext(P.x,P.y-30,'闪避!','#4ff',14);emit(P.x,P.y,'#4ff',5,2,12);return}
  P.hp-=dmg;P.invTmr=30;shake(6);sfx('hit');
  emit(P.x,P.y,'#f44',10,3,18);ftext(P.x,P.y-25,'-'+Math.floor(dmg),'#f44',16);
  // Thorn damage
  if(P.thorn>0){for(const e of enemies){if(Math.hypot(e.x-P.x,e.y-P.y)<80){const td=dmg*P.thorn;e.hp-=td;emit(e.x,e.y,'#4f4',3,2,10)}}}
  if(P.hp<=0)gameOver();
}

function collect(pk){
  if(pk.type==='coin'){const v=Math.ceil((1+wave*.5)*(1+P.coinMul));runCoins+=v;coinGot+=v;ftext(pk.x,pk.y,'+'+v+'💰','#fa0',12);sfx('coin')}
  else if(pk.type==='hp'){const h=15+wave*2;P.hp=Math.min(P.maxHP,P.hp+h);ftext(pk.x,pk.y,'+'+h+'❤','#4f4',14);sfx('heal')}
  else if(pk.type==='bomb'){P.bombs++;ftext(pk.x,pk.y,'+1💣','#ff0',14);sfx('coin')}
}

function gameOver(){
  state=ST.OVER;gamePhase='idle';
  sv.coins+=runCoins;runCoins=0;
  sv.totalKills+=killCnt;
  if(wave>sv.bestW)sv.bestW=wave;if(killCnt>sv.bestK)sv.bestK=killCnt;
  totalUpgCount=Object.values(P.owned).reduce((a,b)=>a+b,0);
  addToBoard(wave,killCnt,runCoins,P.shipName,totalUpgCount);
  store();sfx('die');
}

function checkContact(){
  for(const e of enemies){if(e.isBoss)continue;
    if(rectHit(P.x-P.w/2+5,P.y-P.h/2+5,P.w-10,P.h-10,e.x-e.w/2,e.y-e.h/2,e.w,e.h)){
      if(P.invTmr<=0){dmgP(10+wave*2);const a=Math.atan2(P.y-e.y,P.x-e.x);P.x+=Math.cos(a)*20;P.y+=Math.sin(a)*20}
    }
  }
}

// ==================== WAVES ====================
function updWaves(){
  if(gamePhase!=='fighting')return;
  if(waveList.length>0){
    for(const w of waveList){if(!w.done&&--w.delay<=0){w.done=true;spawnE(w.type)}}
    waveList=waveList.filter(w=>!w.done);
  }
  // Only offer upgrade after all enemies are cleared and some time has passed
  if(waveList.length===0&&enemies.length===0){
    phaseTimer++;
    if(phaseTimer>30){ // Wait 30 frames after clearing
      offerUpg();
    }
  }else{
    phaseTimer=0; // Reset timer while enemies exist
  }
}

function offerUpg(){
  gamePhase='upgrading';phaseTimer=0;
  state=ST.UPG;
  const cnt=3+(P.luck>=3?1:0),lb=P.luck*.1;
  const ws=[10,5+lb*3,2+lb*2,.5+lb,.2+lb];
  const avail=UPG.filter(u=>(P.owned[u.id]||0)<u.mlv);
  if(!avail.length){endUpgrade();return}
  upgChoices=[];const used=new Set();
  for(let i=0;i<cnt&&i<avail.length;i++){
    let ch=null,at=0;
    do{
      const wts=avail.map(u=>used.has(u.id)?0:ws[u.r]*u.w);
      const total=wts.reduce((a,b)=>a+b,0);
      if(total<=0)break; // All used, break
      ch=wPick(avail,wts);at++;
    }while(used.has(ch.id)&&at<50);
    if(ch&&!used.has(ch.id)){used.add(ch.id);upgChoices.push(ch)}
  }
  // Ensure at least one choice
  if(upgChoices.length===0&&avail.length>0){upgChoices.push(avail[0])}
  // If still no choices, skip
  if(upgChoices.length===0){endUpgrade();return}
  sfx('upg');
}

function selUpg(u){
  try{
    if(!u||!u.id){endUpgrade();return}
    const lv=(P.owned[u.id]||0)+1;P.owned[u.id]=lv;recalc();totalUpgCount++;
    ftext(W/2,H/2,u.icon+' '+u.name+' Lv'+lv,RCOL[u.r],18);
    sfx('upg');
  }catch(e){console.error('selUpg error:',e)}
  endUpgrade();
}

function endUpgrade(){
  try{
    state=ST.PLAY;
    gamePhase='fighting';
    phaseTimer=0;stuckTimer=0;
    startNextWave();
  }catch(e){console.error('endUpgrade error:',e)}
}

function recalc(){
  const sh=SHIPS.find(s=>s.id===sv.sel)||SHIPS[0];
  let hp=sh.hp,dmg=sh.dmg,fr=sh.fr,spd=sh.spd,luck=0,coinB=0;
  const sl=sv.sl||{};
  for(const s of SHOP){const lv=sl[s.id]||0;for(let i=0;i<lv;i++){
    if(s.stat==='hp')hp+=s.val;if(s.stat==='dmg')dmg+=s.val;
    if(s.stat==='spd')spd+=s.val;if(s.stat==='fr')fr+=s.val;
    if(s.stat==='luck')luck+=s.val;if(s.stat==='coinB')coinB+=s.val;
  }}
  const owned=P.owned;
  P.maxHP=hp;P.damage=dmg;P.fireRate=fr;P.speed=spd;
  P.bulletCount=1;P.pierce=0;P.critCh=0;P.critMul=1.5;
  P.spreadA=0;P.homing=0;P.explodeR=0;P.chain=0;
  P.armor=0;P.regen=0;P.maxSh=0;P.drones=0;P.luck=luck;P.coinMul=coinB/100;P.magR=60;P.bombs=1;
  P.thorn=0;P.lifesteal=0;P.rage=0;P.frost=0;P.dodge=0;P.killHeal=0;P.bombMul=1;
  // Ship passive
  if(sh.id==='falcon')P.dodge=.05;
  if(sh.id==='hammer')P.armor+=3;
  if(sh.id==='phantom'){P.w=30*.7;P.h=36*.7}
  if(sh.id==='thunder')P.bulletCount+=1;
  if(sh.id==='vampire')P.killHeal=5;
  if(sh.id==='nova')P.bombMul=2;
  P.owned=owned;
  for(const[id,lv]of Object.entries(P.owned)){const u=UPG.find(u=>u.id===id);if(u)u.fx(P,lv)}
  P.hp=Math.min(P.hp,P.maxHP);P.sh=Math.min(P.sh,P.maxSh);
}

// ==================== DRAWING ====================
function drwShip(x,y,w,h,col,isP){
  // Glow
  X.shadowColor=col;X.shadowBlur=18;
  // Main body gradient
  const g=X.createLinearGradient(x,y-h/2,x,y+h/2);
  if(isP){g.addColorStop(0,col);g.addColorStop(1,'#fff');}
  else{g.addColorStop(0,'#fff');g.addColorStop(1,col);}
  X.fillStyle=g;X.beginPath();
  if(isP){
    X.moveTo(x,y-h/2);
    X.lineTo(x-w*.45,y+h*.35);
    X.lineTo(x-w*.15,y+h*.45);
    X.lineTo(x+w*.15,y+h*.45);
    X.lineTo(x+w*.45,y+h*.35);
  }else{
    X.moveTo(x,y+h/2);
    X.lineTo(x-w*.45,y-h*.35);
    X.lineTo(x-w*.2,y-h*.2);
    X.lineTo(x+w*.2,y-h*.2);
    X.lineTo(x+w*.45,y-h*.35);
  }
  X.closePath();X.fill();
  // Wing accents
  X.fillStyle=col;X.globalAlpha=.5;
  if(isP){
    X.fillRect(x-w*.55,y+h*.1,w*.18,h*.35);
    X.fillRect(x+w*.37,y+h*.1,w*.18,h*.35);
  }else{
    X.fillRect(x-w*.55,y-h*.45,w*.18,h*.35);
    X.fillRect(x+w*.37,y-h*.45,w*.18,h*.35);
  }
  X.globalAlpha=1;
  X.shadowBlur=0;
}

function drwPlayer(){
  if(P.invTmr>0&&P.invTmr%4<2)return;
  // Engine flame (gradient)
  const fl=rng(8,14);
  const fg=X.createLinearGradient(P.x,P.y+P.h/2-5,P.x,P.y+P.h/2+fl);
  fg.addColorStop(0,'#0ef');fg.addColorStop(.4,'#48f');fg.addColorStop(1,'transparent');
  X.fillStyle=fg;X.globalAlpha=.7+Math.sin(gt*.3)*.2;
  X.beginPath();X.moveTo(P.x-6,P.y+P.h/2-5);X.lineTo(P.x,P.y+P.h/2+fl);X.lineTo(P.x+6,P.y+P.h/2-5);X.closePath();X.fill();
  // Side flames
  X.globalAlpha=.4;X.beginPath();X.moveTo(P.x-P.w*.35,P.y+P.h*.3);X.lineTo(P.x-P.w*.3,P.y+P.h*.3+fl*.5);X.lineTo(P.x-P.w*.25,P.y+P.h*.3);X.fill();
  X.beginPath();X.moveTo(P.x+P.w*.25,P.y+P.h*.3);X.lineTo(P.x+P.w*.3,P.y+P.h*.3+fl*.5);X.lineTo(P.x+P.w*.35,P.y+P.h*.3);X.fill();
  X.globalAlpha=1;
  drwShip(P.x,P.y,P.w,P.h,P.color,true);
  // Cockpit highlight
  X.fillStyle='#fff';X.globalAlpha=.6;
  X.beginPath();X.ellipse(P.x,P.y-P.h*.1,P.w*.12,P.h*.15,0,0,Math.PI*2);X.fill();
  X.globalAlpha=1;
  // Drones
  for(let i=0;i<P.drones;i++){
    const a=P.droneAng+Math.PI*2/P.drones*i,dx=P.x+Math.cos(a)*50,dy=P.y+Math.sin(a)*50;
    X.fillStyle='#4af';X.shadowColor='#4af';X.shadowBlur=14;
    X.beginPath();X.arc(dx,dy,7,0,Math.PI*2);X.fill();
    X.fillStyle='#fff';X.globalAlpha=.5;X.beginPath();X.arc(dx,dy,3,0,Math.PI*2);X.fill();X.globalAlpha=1;
    X.shadowBlur=0;
  }
  // Shield arc
  if(P.maxSh>0){
    const sa=.3+.2*Math.sin(gt*.1);

}

function hexToRgba(hex,a){
  let r=0,g=0,b_=0;
  if(hex.length===4){r=parseInt(hex[1]+hex[1],16);g=parseInt(hex[2]+hex[2],16);b_=parseInt(hex[3]+hex[3],16);}
  else if(hex.length===7){r=parseInt(hex[1]+hex[2],16);g=parseInt(hex[3]+hex[4],16);b_=parseInt(hex[5]+hex[6],16);}
  return `rgba(${r},${g},${b_},${a})`;
}
function drwBoss(b){
  const col=b.hf>0?'#fff':b.color;
  // Body with gradient
  const bg=X.createRadialGradient(b.x,b.y,0,b.x,b.y,b.w);
  bg.addColorStop(0,'#fff');bg.addColorStop(.4,col);bg.addColorStop(1,hexToRgba(b.color,0.5));
  X.fillStyle=bg;X.beginPath();
  X.moveTo(b.x,b.y-b.h/2);X.lineTo(b.x-b.w/2,b.y);X.lineTo(b.x-b.w*.7,b.y+b.h/2);
  X.lineTo(b.x-b.w/4,b.y+b.h/3);X.lineTo(b.x,b.y+b.h/2);
  X.lineTo(b.x+b.w/4,b.y+b.h/3);X.lineTo(b.x+b.w*.7,b.y+b.h/2);X.lineTo(b.x+b.w/2,b.y);
  X.closePath();X.fill();
  X.shadowColor=b.color;X.shadowBlur=25;X.fill();X.shadowBlur=0;
  // Armor plates
  X.strokeStyle=b.color;X.globalAlpha=.4;X.lineWidth=2;
  X.beginPath();X.moveTo(b.x-b.w*.3,b.y-b.h*.2);X.lineTo(b.x-b.w*.5,b.y+b.h*.2);X.stroke();
  X.beginPath();X.moveTo(b.x+b.w*.3,b.y-b.h*.2);X.lineTo(b.x+b.w*.5,b.y+b.h*.2);X.stroke();
  X.globalAlpha=1;X.lineWidth=1;
  // Eyes with glow
  X.fillStyle='#ff0';X.shadowColor='#ff0';X.shadowBlur=12;
  X.beginPath();X.arc(b.x-14,b.y-5,6,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(b.x+14,b.y-5,6,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.beginPath();X.arc(b.x-14,b.y-5,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(b.x+14,b.y-5,2,0,Math.PI*2);X.fill();
  X.shadowBlur=0;
  // HP bar with gradient
  const hpR=b.hp/b.mhp;
  X.fillStyle='#111';X.fillRect(30,20,W-60,14);
  const hg=X.createLinearGradient(30,0,30+(W-60)*hpR,0);

  X.fillStyle=b.color;X.font='bold 12px "Courier New",monospace';X.textAlign='center';

  X.fillText(`${b.name} [${ph}] - 波次 ${wave}`,W/2,16);
  X.shadowBlur=0;
}

    X.fillStyle=i===0?'#fa0':i===1?'#ccc':i===2?'#c80':'#888';X.font='11px "Courier New"';X.textAlign='center';
    X.fillText(i+1,40,cy+18);
    X.fillStyle='#fff';X.fillText(b.wave,80,cy+18);X.fillText(b.kills,130,cy+18);
    X.fillStyle='#fa0';X.fillText(b.coins,180,cy+18);
    X.fillStyle='#0ef';X.font='9px "Courier New"';X.fillText(b.ship||'?',240,cy+18);
    X.fillStyle='#c4f';X.fillText(b.upgs||0,320,cy+18);
    X.fillStyle='#666';X.font='8px "Courier New"';X.fillText(new Date(b.date).toLocaleDateString(),400,cy+18);
  }
  drwBtn(10,H-45,55,28,'返回','#888',()=>state=ST.MENU,sz=11);
}

// Game Over
function drwOver(){
  X.fillStyle='rgba(0,0,0,.85)';X.fillRect(0,0,W,H);
  X.fillStyle='#f44';X.font='bold 34px "Courier New"';X.textAlign='center';
  X.shadowColor='#f44';X.shadowBlur=20;X.fillText('任务失败',W/2,130);X.shadowBlur=0;
  // Stats
  X.fillStyle='#aaa';X.font='14px "Courier New"';
  const stats=[
    `到达波次: ${wave}`,
    `击杀数: ${killCnt}`,
    `最高连击: ${maxCombo}x`,
    `获得金币: ${coinGot}`,
    `强化次数: ${totalUpgCount}`,
    `最高记录: 波次 ${sv.bestW}`,
  ];
  stats.forEach((s,i)=>X.fillText(s,W/2,190+i*28));
  // Rank
  const rank=wave>=30?'S':wave>=20?'A':wave>=12?'B':wave>=6?'C':'D';
  const rcol=rank==='S'?'#fa0':rank==='A'?'#f44':rank==='B'?'#48f':rank==='C'?'#4d4':'#888';
  X.fillStyle=rcol;X.font='bold 48px "Courier New"';X.fillText(rank,W/2,430);
  X.fillStyle='#888';X.font='11px "Courier New"';X.fillText('评价',W/2,450);
  // Buttons
  drwBtn(W/2-90,480,180,42,'🚀 再来一局','#0ef',()=>{initGame();state=ST.PLAY});
  drwBtn(W/2-90,535,180,42,'返回主菜单','#888',()=>state=ST.MENU);
  drwBtn(W/2-90,590,180,42,'🛒 商店','#4f4',()=>state=ST.SHOP);
}

// ==================== MAIN LOOP ====================
function frame(){
  try{
  gt++;updStars();updParts();updFloats();

  // Game logic based on gamePhase
  if(gamePhase==='fighting'){
    updPlayer();updEnemies();updBullets();checkContact();updWaves();
    if(comboT>0){comboT--;if(comboT<=0)comboN=0}
    for(let i=pickups.length-1;i>=0;i--){const pk=pickups[i];pk.life--;pk.y+=pk.vy*.5;if(pk.life<=0||pk.y>H+20)pickups.splice(i,1)}
  }

  // Stuck detection: if in upgrading/event state too long, force advance (60 seconds)
  if(gamePhase==='upgrading'||gamePhase==='event'){
    stuckTimer++;
    if(stuckTimer>3600){ // 60 seconds at 60fps
      stuckTimer=0;
      endUpgrade();
    }
  }else{
    stuckTimer=0;
  }

  // Auto-save coins every 10 seconds during gameplay
  if(gamePhase==='fighting'&&gt%600===0){
    sv.coins+=runCoins;runCoins=0;store();
  }

  // RENDER
  const bg=X.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#050510');bg.addColorStop(1,'#0a0a2e');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  let shaked=false;
  if(shakeAmt>.5){X.save();X.translate(rng(-shakeAmt,shakeAmt),rng(-shakeAmt,shakeAmt));shakeAmt*=.85;shaked=true}else shakeAmt=0;
  drwStars();
  switch(state){
    case ST.MENU:drwMenu();break;
    case ST.SHIP:drwShipSelect();break;
    case ST.SHOP:drwShop();break;
    case ST.BOARD:drwBoard();break;
    case ST.PLAY:
    case ST.UPG:
    case ST.EVENT:
      drwPickups();drwBullets();drwEnemies();drwPlayer();drwParts();drwFloats();drwAnnounce();drwHUD();
      if(gamePhase==='upgrading')drwUpgScreen();
      if(gamePhase==='event')drwEventScreen();
      break;
    case ST.OVER:drwParts();drwOver();break;
  }
  if(shaked)X.restore();
  M.click=0;M.dbl=0;
  }catch(err){
    // On error, force advance to prevent freeze
    console.error('Game error:',err);
    if(gamePhase==='upgrading'||gamePhase==='event'){endUpgrade()}
    else if(gamePhase==='fighting'){offerUpg()}
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
